<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dada Clock</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #2563eb;
      --accent-2: #eff6ff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    p.sub {
      margin: 0;
      color: var(--muted);
      max-width: 680px;
    }

    .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 12px 16px;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: var(--shadow);
      font-weight: 600;
    }

    .btn:hover { border-color: #cbd5e1; }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 0.92rem;
      color: var(--muted);
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 16px;
      font: inherit;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .help {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .outputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .zone-card {
      border: 1px solid var(--border);
      background: linear-gradient(180deg, #fff, #fbfdff);
      border-radius: 22px;
      padding: 18px;
    }

    .zone-card .zone {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .zone-card .time {
      margin-top: 10px;
      font-size: 1.4rem;
      font-weight: 800;
    }

    .zone-card .date {
      margin-top: 6px;
      color: var(--muted);
    }

    .error {
      color: #b91c1c;
      font-weight: 600;
      margin-top: 10px;
      display: none;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--muted);
    }

    @media (max-width: 800px) {
      .form-grid, .outputs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>Time Zone Calculator</h1>
        <p class="sub">
          Enter a date and time in one source time zone.
        </p>
      </div>
      <button class="btn" id="nowBtn">Use current time</button>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Input</h2>
        <div class="form-grid">
          <div class="field">
            <label for="sourceZone">Source time zone</label>
            <select id="sourceZone"></select>
          </div>

          <div class="field">
            <label for="datetime">Date and time</label>
            <input id="datetime" type="datetime-local" />
          </div>

          <div class="field">
            <label>Update</label>
            <button class="btn" id="convertBtn" style="width:100%;">Convert</button>
          </div>
        </div>
        <div class="help">
          The input time is interpreted as local time in the selected source zone, not your computer’s zone.
        </div>
        <div class="error" id="error"></div>
      </section>

      <section class="card">
        <h2>Results</h2>
        <div class="outputs" id="results"></div>
      </section>
    </div>
  </div>

  <script>
    const TIME_ZONES = [
      "UTC",
      "America/New_York",
      "America/Chicago",
      "America/Denver",
      "America/Los_Angeles",
      "Europe/London",
      "Europe/Paris",
      "Europe/Berlin",
      "Asia/Dubai",
      "Asia/Kolkata",
      "Asia/Singapore",
      "Asia/Tokyo",
      "Australia/Sydney"
    ];

    const DISPLAY_ZONES = [
      "UTC",
      "America/New_York",
      "Europe/London",
      "Asia/Kolkata",
      "Asia/Tokyo"
    ];

    const sourceZoneEl = document.getElementById("sourceZone");
    const datetimeEl = document.getElementById("datetime");
    const resultsEl = document.getElementById("results");
    const errorEl = document.getElementById("error");
    const nowBtn = document.getElementById("nowBtn");
    const convertBtn = document.getElementById("convertBtn");

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function fillZones() {
      sourceZoneEl.innerHTML = TIME_ZONES
        .map(z => `<option value="${z}">${z}</option>`)
        .join("");
      sourceZoneEl.value = "America/New_York";
    }

    function localNowValue() {
      const d = new Date();
      const year = d.getFullYear();
      const month = pad(d.getMonth() + 1);
      const day = pad(d.getDate());
      const hour = pad(d.getHours());
      const minute = pad(d.getMinutes());
      return `${year}-${month}-${day}T${hour}:${minute}`;
    }

    function parseDateTime(value) {
      const [datePart, timePart] = value.split("T");
      if (!datePart || !timePart) return null;
      const [year, month, day] = datePart.split("-").map(Number);
      const [hour, minute] = timePart.split(":").map(Number);
      if ([year, month, day, hour, minute].some(Number.isNaN)) return null;
      return { year, month, day, hour, minute };
    }

    function getParts(date, timeZone) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(date);

      const out = {};
      for (const p of parts) {
        if (p.type !== "literal") out[p.type] = p.value;
      }
      return {
        year: Number(out.year),
        month: Number(out.month),
        day: Number(out.day),
        hour: Number(out.hour),
        minute: Number(out.minute),
        second: Number(out.second)
      };
    }

    function zonedTimeToUtc(year, month, day, hour, minute, timeZone) {
      let utc = Date.UTC(year, month - 1, day, hour, minute, 0, 0);

      for (let i = 0; i < 3; i++) {
        const guess = new Date(utc);
        const parts = getParts(guess, timeZone);

        const actualAsUtc = Date.UTC(
          parts.year, parts.month - 1, parts.day,
          parts.hour, parts.minute, parts.second, 0
        );

        const wantedAsUtc = Date.UTC(year, month - 1, day, hour, minute, 0, 0);
        const diff = actualAsUtc - wantedAsUtc;

        if (diff === 0) break;
        utc -= diff;
      }

      return new Date(utc);
    }

    function formatZone(date, timeZone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "short",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZoneName: "short"
      }).format(date);
    }

    function formatTimeOnly(date, timeZone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).format(date);
    }

    function formatDateOnly(date, timeZone) {
      return new Intl.DateTimeFormat("en-GB", {
        timeZone,
        weekday: "short",
        year: "numeric",
        month: "short",
        day: "2-digit"
      }).format(date);
    }

    function renderResults() {
      const value = datetimeEl.value;
      const parsed = parseDateTime(value);

      if (!parsed) {
        errorEl.textContent = "Please enter a valid date and time.";
        errorEl.style.display = "block";
        resultsEl.innerHTML = "";
        return;
      }

      errorEl.style.display = "none";

      const utcDate = zonedTimeToUtc(
        parsed.year,
        parsed.month,
        parsed.day,
        parsed.hour,
        parsed.minute,
        sourceZoneEl.value
      );

      resultsEl.innerHTML = DISPLAY_ZONES.map(zone => {
        return `
          <div class="zone-card">
            <div class="zone">${zone}</div>
            <div class="time">${formatTimeOnly(utcDate, zone)}</div>
            <div class="date">${formatZone(utcDate, zone)}</div>
          </div>
        `;
      }).join("");
    }

    nowBtn.addEventListener("click", () => {
      datetimeEl.value = localNowValue();
      renderResults();
    });

    convertBtn.addEventListener("click", renderResults);
    sourceZoneEl.addEventListener("change", renderResults);
    datetimeEl.addEventListener("change", renderResults);
    datetimeEl.addEventListener("input", renderResults);

    fillZones();
    datetimeEl.value = localNowValue();
    renderResults();
  </script>
</body>
</html>
